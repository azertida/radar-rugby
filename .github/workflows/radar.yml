name: Mise à jour quotidienne du radar Réalisation

on:
  schedule:
    - cron: '17 5 * * *'
    - cron: '41 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Cloner le dépôt
        uses: actions/checkout@v4
      
      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Configurer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Cloner iptv-org/epg
        run: |
          git clone --depth 1 https://github.com/iptv-org/epg.git /tmp/epg
          cd /tmp/epg
          npm install --silent
      
      - name: Récupérer la grille Pickx (24 chaînes)
        run: |
          cd /tmp/epg
          npm run grab -- --channels=$GITHUB_WORKSPACE/pickx_channels.xml --days=7 --output=/tmp/pickx_guide.xml
          echo "Taille du fichier généré :"
          ls -lh /tmp/pickx_guide.xml
      
      - name: Lancer le radar
        run: |
          python3 radar.py --source=/tmp/pickx_guide.xml
      
      - name: Commit le radar.json si modifié
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add radar.json
          if git diff --staged --quiet; then
            echo "Aucune modification à committer, sortie propre"
            exit 0
          fi
          git commit -m "🎬 Mise à jour automatique du radar Réalisation"
          git pull --rebase origin main
          git push
